version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: iscts_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: iscts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iscts"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache Service (Redis)
  redis:
    image: redis:7-alpine
    container_name: iscts_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # FastAPI Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iscts_backend
    restart: always
    environment:
      - USE_POSTGRES=true
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=iscts
      - USE_REDIS=true
      - REDIS_HOST=redis
      - SECRET_KEY=iscts-production-secret-key-change-me
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./ai_model:/app/ai_model

  # Frontend Web UI Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iscts_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
